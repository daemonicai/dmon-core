services:
  aimail:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${AIM_PORT:-8080}:8080"
    volumes:
      - aimail_data:/data
    environment:
      - AIM_GOOGLE_CLIENT_ID=${AIM_GOOGLE_CLIENT_ID:-}
      - AIM_GOOGLE_CLIENT_SECRET=${AIM_GOOGLE_CLIENT_SECRET:-}
      - AIM_API_KEY=${AIM_API_KEY:-}
      - AIM_DATA_DIR=/data
      - AIM_PORT=8080
      - AIM_BACKFILL_MONTHS=${AIM_BACKFILL_MONTHS:-1}
    restart: unless-stopped

volumes:
  aimail_data:
