services:
  dmail:
    # Build context is the repo root so central-package-management props resolve.
    # Run from this directory: `docker compose up --build`.
    build:
      context: ../..
      dockerfile: services/Dmail/Dockerfile
    ports:
      # Published to host loopback only — see docs/deploying-dmail.md.
      - "127.0.0.1:${DMAIL_PORT:-8080}:8080"
    volumes:
      - dmail_data:/data
    environment:
      - DMAIL_GOOGLE_CLIENT_ID=${DMAIL_GOOGLE_CLIENT_ID:-}
      - DMAIL_GOOGLE_CLIENT_SECRET=${DMAIL_GOOGLE_CLIENT_SECRET:-}
      - DMAIL_API_KEY=${DMAIL_API_KEY:-}
      - DMAIL_DATA_DIR=/data
      - DMAIL_PORT=8080
      - DMAIL_BACKFILL_MONTHS=${DMAIL_BACKFILL_MONTHS:-1}
    restart: unless-stopped

volumes:
  dmail_data:
