services:
  dmail:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${DMAIL_PORT:-8080}:8080"
    volumes:
      - dmail_data:/data
    environment:
      - DMAIL_GOOGLE_CLIENT_ID=${DMAIL_GOOGLE_CLIENT_ID:-}
      - DMAIL_GOOGLE_CLIENT_SECRET=${DMAIL_GOOGLE_CLIENT_SECRET:-}
      - DMAIL_API_KEY=${DMAIL_API_KEY:-}
      - DMAIL_DATA_DIR=/data
      - DMAIL_PORT=8080
      - DMAIL_BACKFILL_MONTHS=${DMAIL_BACKFILL_MONTHS:-1}
    restart: unless-stopped

volumes:
  dmail_data:
