# dmon configuration
# Providers are now declared in Dmon.cs via #:package directives and fluent verbs.
# A verb with no arguments uses the factory's defaults; for a custom endpoint or
# model use the verb overloads in Dmon.cs (e.g. UseOllama(baseUrl, model)).
# See docs/adrs/ADR-022-composition-root-registration-facets.md.

# Session storage settings
Dmon:
  Session:
    # Messages larger than this (bytes) are stored as attachment files
    AttachmentThresholdBytes: 1024
  Provider:
    Retry:
      BaseDelay: "00:00:01"
      MaxDelay: "00:00:30"
      MaxAttempts: 5
  Compaction:
    Threshold: 100
