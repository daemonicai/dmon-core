name: Release
#
# NuGet-family release pipeline (ADR-035, release-matrix change). Triggered by
# a per-package tag `<area>/<name>-vX.Y.Z`. Tag -> project resolution reads
# each project's own `<MinVerTagPrefix>` (set per ADR-035 D7) rather than a
# second map: the shared area map at .github/area-map.yml is area-granular
# (dorny/paths-filter config for ci.yml) and cannot mechanically derive a
# `<name>` segment's exact .csproj (e.g. `anthropic` -> `Dmon.Providers.Anthropic`),
# so it is not duplicated here (ADR-035 D6 -- exactly one area map; this is
# per-package tag resolution, a different concern).
#
# The app-artifact job (app/<name>-v* -> GitHub Release) publishes non-NuGet
# first-party artifacts on a separate publish sink (ADR-035 D3). dmonium
# (daemon/Daemon.App) is the only app-artifact member today; Dmon.Desktop
# bundling is deferred (no `dotnet publish` bundle recipe; IsPackable=false,
# no RuntimeIdentifier/self-contained config, no build target; Avalonia has
# no built-in .app/installer bundler) -- see its README "Deferred: installable
# artifact" section. An app/desktop-v* tag fails fast in the app-artifact job
# below rather than being silently accepted.
#
# nuget.org publishing is keyless (Trusted Publishing / OIDC): the `release`
# job requests an `id-token` and exchanges it for a short-lived push key via
# `NuGet/login@v1` immediately before the push -- no long-lived NUGET_API_KEY
# secret exists. The trust is anchored maintainer-side by a nuget.org Trusted
# Publishing policy that must match exactly: Repository Owner `daemonicai`,
# Repository `dmon-core`, Workflow File `release.yml`, Environment BLANK. The
# only identity input carried in the workflow is the non-secret `NUGET_USER`
# nuget.org profile name (not an email).

on:
  push:
    tags:
      - 'core/*-v*'
      - 'providers/*-v*'
      - 'tools/*-v*'
      - 'memory/*-v*'
      - 'frontends/*-v*'
      - 'app/*-v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: pack and publish
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.ref_name, 'app/') }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # MinVer requires full history and all tags to compute versions correctly.
          fetch-depth: 0
          # `make test` runs the Dmail app-boot integration tests, which load the
          # Git-LFS-tracked ONNX model; without LFS materialization it is a pointer
          # stub and OnnxRuntime fails with InvalidProtobuf (mirrors ci.yml).
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Build
        run: make build

      - name: Run tests
        run: make test

      - name: Resolve tag to project and pack
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p out

          # <area>/<name>-vX.Y.Z -> <area>/<name>-v (the project's MinVerTagPrefix).
          PREFIX="${TAG%-v*}-v"
          MATCHES=$(grep -rlF --include='*.csproj' -- "<MinVerTagPrefix>${PREFIX}</MinVerTagPrefix>" . || true)
          COUNT=$(printf '%s\n' "$MATCHES" | grep -c . || true)
          if [ "$COUNT" -ne 1 ]; then
            echo "Tag '$TAG' (prefix '$PREFIX') resolved to $COUNT projects; expected exactly 1:" >&2
            printf '%s\n' "$MATCHES" >&2
            exit 1
          fi
          PROJ="$MATCHES"
          echo "Resolved $TAG -> $PROJ"

          # make build only compiles core/terminal/memory (see Makefile); providers,
          # tools, and Dmon.Network are not built by it, so an explicit build is
          # required before --no-build pack. Building here (not via `make build`)
          # keeps the pack step from silently rebuilding the whole solution.
          dotnet build "$PROJ" -c Release
          dotnet pack "$PROJ" -c Release --no-build -o out

      - name: Log in to nuget.org (Trusted Publishing / OIDC)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to nuget.org
        run: |
          dotnet nuget push "out/*.nupkg" \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          # .snupkg symbol packages, where the packed project produces them.
          if compgen -G "out/*.snupkg" > /dev/null; then
            dotnet nuget push "out/*.snupkg" \
              --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          fi

  app-artifact:
    name: package and attach app artifact
    runs-on: macos-latest
    if: ${{ startsWith(github.ref_name, 'app/') }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag and enforce app-artifact membership
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          case "$TAG" in
            app/dmonium-v*) : ;;
            app/desktop-v*)
              echo "app/desktop-* is deferred to a follow-up change; Dmon.Desktop has no bundle recipe yet." >&2
              exit 1 ;;
            *) echo "Unknown app tag '$TAG'." >&2; exit 1 ;;
          esac
          VERSION="${TAG##*-v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build dmonium
        run: make daemon-app

      - name: Wrap dmonium in an unsigned .app bundle
        run: |
          set -euo pipefail
          BUNDLE="dist/dmonium.app"
          mkdir -p "$BUNDLE/Contents/MacOS"
          cp daemon/Daemon.App/.build/release/DaemonApp "$BUNDLE/Contents/MacOS/DaemonApp"

          cat > "$BUNDLE/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>dmonium</string>
            <key>CFBundleDisplayName</key>
            <string>dmonium</string>
            <key>CFBundleExecutable</key>
            <string>DaemonApp</string>
            <key>CFBundleIdentifier</key>
            <string>ai.daemonic.dmonium</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

          plutil -lint "$BUNDLE/Contents/Info.plist"

      - name: Zip the app bundle
        run: |
          set -euo pipefail
          ditto -c -k --keepParent "dist/dmonium.app" "dmonium-${VERSION}-macos-arm64-unsigned.zip"

      - name: Attach to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            --title "dmonium ${VERSION} (unsigned)" \
            --notes "Unsigned, un-notarized macOS (arm64) build. Gatekeeper will quarantine it -- right-click -> Open, or clear the quarantine xattr. Signing/notarization is deferred (ADR-035 Open Question)." \
            "dmonium-${VERSION}-macos-arm64-unsigned.zip"
